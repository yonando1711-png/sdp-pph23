services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: pph23_converter_app:latest
    container_name: pph23_converter_app
    restart: unless-stopped
    ports:
      - "8005:8080" # serversideup exposes 8080 by default
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_CONNECTION=sqlite
      - DB_DATABASE=/var/www/html/storage/database.sqlite
      - APP_URL=${APP_URL:-http://localhost}
      - APP_NAME="${APP_NAME:-Harent PPh23 Converter}"
      # Serversideup initialization variables
      - AUTORUN_LARAVEL_MIGRATION=true
      - AUTORUN_LARAVEL_STORAGE_LINK=true
      - AUTORUN_LARAVEL_OPTIMIZE=true
      # Provide your APP_KEY via Portainer environment variables
      - APP_KEY=${APP_KEY:-base64:d8J/x8w6xZ3yT+eU8JkP8r2Z9yQ8xV0xZ3yT+eU8JkP=}
      - PROD_ADMIN_PASSWORD=${PROD_ADMIN_PASSWORD:-admin987}
    volumes:
      - app-storage:/var/www/html/storage

volumes:
  app-storage:
